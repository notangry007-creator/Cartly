name: Buy App CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Type Check & Lint ────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buy/package-lock.json
      - name: Install dependencies
        run: cd buy && npm ci
      - name: TypeScript check
        run: cd buy && npm run ts-check

  # ─── EAS Build (Preview) ─────────────────────────────────────────────────────
  build-preview:
    name: EAS Preview Build
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buy/package-lock.json
      - name: Install dependencies
        run: cd buy && npm ci
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build preview (Android APK)
        run: cd buy && eas build --platform android --profile preview --non-interactive
      - name: Build preview (iOS Simulator)
        run: cd buy && eas build --platform ios --profile preview --non-interactive

  # ─── EAS Build (Production) ──────────────────────────────────────────────────
  build-production:
    name: EAS Production Build
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buy/package-lock.json
      - name: Install dependencies
        run: cd buy && npm ci
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build production (Android AAB)
        run: cd buy && eas build --platform android --profile production --non-interactive
      - name: Build production (iOS)
        run: cd buy && eas build --platform ios --profile production --non-interactive

  # ─── EAS Update (OTA) ────────────────────────────────────────────────────────
  ota-update:
    name: EAS OTA Update
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buy/package-lock.json
      - name: Install dependencies
        run: cd buy && npm ci
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publish OTA update
        run: cd buy && eas update --channel production --message "Auto-update from CI: ${{ github.sha }}"
